<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Ecoenergia Asturias</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a7a4a;
    --verde-claro: #2da464;
    --verde-oscuro: #0f4f30;
    --azul: #1a4f7a;
    --azul-claro: #2d7abf;
    --crema: #f5f0e8;
    --crema2: #ede6d6;
    --texto: #1c2b1e;
    --blanco: #ffffff;
    --sombra: 0 4px 24px rgba(15,79,48,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--crema);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: var(--verde-oscuro);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    transition: background 0.3s;
  }
  .header.modo-carlos { background: #0f2f4f; }
  .logo-circle {
    width: 40px; height: 40px;
    background: var(--verde-claro);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    transition: background 0.3s;
  }
  .header.modo-carlos .logo-circle { background: var(--azul-claro); }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem; color: var(--crema);
  }
  .header-text p { font-size: 0.70rem; color: #8fba9e; transition: color 0.3s; }
  .header.modo-carlos .header-text p { color: #8fb5d4; }

  /* TOGGLE */
  .modo-toggle {
    margin-left: auto;
    display: flex;
    background: rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 3px; gap: 2px;
  }
  .modo-btn {
    padding: 5px 12px;
    border: none; border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    background: transparent; color: rgba(255,255,255,0.55);
  }
  .modo-btn.active { background: var(--blanco); color: var(--verde-oscuro); }
  .header.modo-carlos .modo-btn.active { color: #0f2f4f; }

  /* BANNER */
  .modo-banner {
    width: 100%; max-width: 780px;
    margin-top: 68px;
    padding: 9px 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; font-weight: 500;
    transition: all 0.3s;
  }
  .modo-banner.cliente { background: #e6f4ed; color: var(--verde-oscuro); }
  .modo-banner.carlos { background: #e6eff8; color: #0f2f4f; }

  /* CHAT */
  .chat-wrapper {
    width: 100%; max-width: 780px;
    height: 100vh;
    display: flex; flex-direction: column;
  }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 12px 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--crema2); border-radius: 4px; }

  /* BURBUJAS */
  .msg {
    display: flex; gap: 8px;
    max-width: 92%;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-top: 2px;
  }
  .msg.assistant .avatar { background: var(--verde); color: #fff; }
  .msg.user .avatar { background: var(--crema2); color: var(--verde-oscuro); }
  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 0.88rem; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.assistant .bubble {
    background: var(--blanco); color: var(--texto);
    border-bottom-left-radius: 4px;
    box-shadow: var(--sombra);
  }
  .msg.user .bubble {
    background: var(--verde); color: var(--blanco);
    border-bottom-right-radius: 4px;
  }
  body.modo-carlos .msg.assistant .avatar { background: var(--azul); }
  body.modo-carlos .msg.user .bubble { background: var(--azul); }
  body.modo-carlos .msg.assistant .bubble { border-left: 3px solid var(--azul-claro); }

  /* CAJA RESPUESTA WA */
  .wa-box {
    background: #e9fbe9;
    border: 1.5px solid #4ade80;
    border-radius: 14px;
    padding: 13px 15px;
    max-width: 92%;
    align-self: flex-start;
    animation: fadeUp 0.25s ease both;
  }
  .wa-label {
    font-size: 0.67rem; font-weight: 700;
    color: #166534; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .wa-text {
    font-size: 0.88rem; color: #1c2b1e;
    line-height: 1.6; white-space: pre-wrap;
    word-break: break-word;
  }
  .copy-btn {
    margin-top: 10px;
    padding: 7px 14px;
    background: #16a34a; color: white;
    border: none; border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.76rem; font-weight: 600;
    cursor: pointer; display: inline-flex;
    align-items: center; gap: 5px;
    transition: background 0.18s;
  }
  .copy-btn:hover { background: #15803d; }
  .copy-btn.copied { background: #059669; }

  /* CHIPS */
  .chips {
    padding: 0 16px 10px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    background: var(--blanco);
    border: 1.5px solid var(--verde-claro);
    color: var(--verde-oscuro);
    border-radius: 20px; padding: 5px 12px;
    font-size: 0.74rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s;
    font-family: 'Outfit', sans-serif;
  }
  .chip:hover { background: var(--verde-claro); color: #fff; }
  body.modo-carlos .chip { border-color: var(--azul-claro); color: var(--azul); }
  body.modo-carlos .chip:hover { background: var(--azul-claro); color: #fff; }

  /* INPUT */
  .input-area {
    padding: 8px 16px 16px;
    background: var(--crema);
    border-top: 1px solid var(--crema2);
  }
  .input-hint {
    font-size: 0.68rem; color: #aab5ad;
    margin-bottom: 5px; padding-left: 2px;
  }
  body.modo-carlos .input-hint { color: #7a9bb5; }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--blanco);
    border: 1.5px solid var(--crema2);
    border-radius: 14px; padding: 8px 12px;
    box-shadow: var(--sombra);
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--verde-claro); }
  body.modo-carlos .input-row:focus-within { border-color: var(--azul-claro); }
  textarea {
    flex: 1; border: none; outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; color: var(--texto);
    resize: none; max-height: 100px; line-height: 1.5;
  }
  textarea::placeholder { color: #aab5ad; }
  .send-btn {
    width: 34px; height: 34px;
    background: var(--verde); border: none;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.18s, transform 0.12s;
  }
  .send-btn:hover { background: var(--verde-claro); transform: scale(1.05); }
  .send-btn:disabled { background: #c5d5c9; cursor: not-allowed; transform: none; }
  body.modo-carlos .send-btn { background: var(--azul); }
  body.modo-carlos .send-btn:hover { background: var(--azul-claro); }
  body.modo-carlos .send-btn:disabled { background: #b5c9d8; }
  .send-btn svg { width: 15px; height: 15px; fill: white; }

  /* TYPING */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--verde-claro); border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)}
  }
  body.modo-carlos .typing-dots span { background: var(--azul-claro); }

  /* HISTORIAL */
  .historial-btn {
    position: fixed; bottom: 90px; right: 16px;
    background: var(--verde-oscuro); color: white;
    border: none; border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; transition: background 0.2s;
  }
  .historial-btn:hover { background: var(--verde); }

  .historial-panel {
    position: fixed; top: 0; right: -100%;
    width: min(320px, 90vw); height: 100vh;
    background: var(--blanco);
    box-shadow: -4px 0 24px rgba(0,0,0,0.15);
    z-index: 200; transition: right 0.3s ease;
    display: flex; flex-direction: column;
  }
  .historial-panel.open { right: 0; }
  .historial-header {
    padding: 20px 16px 14px;
    background: var(--verde-oscuro); color: var(--crema);
    display: flex; align-items: center; justify-content: space-between;
  }
  .historial-header h2 { font-size: 0.95rem; font-weight: 600; }
  .close-btn {
    background: none; border: none; color: var(--crema);
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .historial-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .historial-item {
    padding: 10px 12px;
    background: var(--crema); border-radius: 10px;
    cursor: pointer; transition: background 0.18s;
    border: 1px solid var(--crema2);
  }
  .historial-item:hover { background: var(--crema2); }
  .hi-fecha { font-size: 0.65rem; color: #aab5ad; margin-bottom: 3px; }
  .hi-preview { font-size: 0.80rem; color: var(--texto); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-modo { font-size: 0.62rem; font-weight: 600; margin-top: 4px; color: var(--verde); }
  .hi-modo.carlos { color: var(--azul); }
  .historial-empty { text-align: center; padding: 40px 20px; color: #aab5ad; font-size: 0.82rem; }
  .historial-actions {
    padding: 12px; border-top: 1px solid var(--crema2);
    display: flex; gap: 8px;
  }
  .h-action-btn {
    flex: 1; padding: 8px;
    border-radius: 8px; border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.74rem; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
  }
  .h-action-btn.new { background: var(--verde); color: white; }
  .h-action-btn.new:hover { background: var(--verde-claro); }
  .h-action-btn.clear { background: #fee2e2; color: #991b1b; }
  .h-action-btn.clear:hover { background: #fecaca; }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 150;
  }
  .overlay.open { display: block; }

  .disclaimer {
    text-align: center; font-size: 0.64rem;
    color: #bbc5be; padding: 2px 16px 5px;
  }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="logo-circle">🌱</div>
  <div class="header-text">
    <h1>Ecoenergia Asturias</h1>
    <p id="headerSub">Asistente de atención al cliente</p>
  </div>
  <div class="modo-toggle">
    <button class="modo-btn active" id="btnCliente" onclick="setModo('cliente')">🌐 Cliente</button>
    <button class="modo-btn" id="btnCarlos" onclick="setModo('carlos')">⚡ Carlos</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeHistorial()"></div>

<div class="historial-panel" id="historialPanel">
  <div class="historial-header">
    <h2>📋 Conversaciones guardadas</h2>
    <button class="close-btn" onclick="closeHistorial()">✕</button>
  </div>
  <div class="historial-list" id="historialList"></div>
  <div class="historial-actions">
    <button class="h-action-btn new" onclick="nuevaConversacion()">＋ Nueva</button>
    <button class="h-action-btn clear" onclick="borrarTodo()">🗑 Borrar todo</button>
  </div>
</div>

<button class="historial-btn" onclick="openHistorial()" title="Conversaciones guardadas">📋</button>

<div class="chat-wrapper">
  <div class="modo-banner cliente" id="modoBanner">
    <span>🌐</span>
    <span id="bannerText">Modo Cliente — El asistente responde como Ecoenergia</span>
  </div>

  <div class="messages" id="messages"></div>
  <div class="chips" id="chips"></div>

  <div class="input-area">
    <div class="input-hint" id="inputHint">Escribe tu consulta</div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Escribe aquí..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="disclaimer" id="disclaimer">Las estimaciones de precio son orientativas. Contacta con nosotros para un presupuesto definitivo.</div>
</div>

<script>
const SYSTEM_CLIENTE = `Eres el asistente virtual de Ecoenergia Asturias, empresa especializada en eficiencia energética y energías renovables, fundada en 2022, sede en Gijón. Operas en Asturias, León, Cantabria y Galicia con un equipo de ~12 personas.

VALORES: seriedad, honestidad y responsabilidad. Tono cercano, claro y profesional.

SERVICIOS:
1. AEROTERMIA: Bombas de calor aire-agua (calefacción, ACS, refrigeración). Marcas: Mitsubishi, Daikin, Panasonic. Precio orientativo: 8.000–18.000€.
2. ENERGÍA SOLAR FOTOVOLTAICA: Autoconsumo residencial y comercial, con o sin baterías. Precio orientativo: 5.000–20.000€. Tramitación incluida.
3. VENTILACIÓN MECÁNICA (MVHR): Recuperación de calor, mejora calidad del aire. Precio orientativo: 3.000–7.000€.
4. REHABILITACIÓN ENERGÉTICA INTEGRAL: Llave en mano, calificación hasta clase A. Proyecto técnico, obra y certificado incluidos.
5. ASESORÍA ENERGÉTICA: Auditorías, certificados energéticos, estudios de viabilidad.

SUBVENCIONES:
- Programa PRTR (Next Generation EU): hasta 40–60% de ayuda para aerotermia, solar, envolvente.
- Ayudas del Principado de Asturias.
- Deducción IRPF por mejoras energéticas: 15–60% según caso.
- Asesoramos al cliente en la tramitación.

PLAZOS:
- Aerotermia: 2–4 semanas desde contrato.
- Solar: 3–6 semanas.
- Rehabilitación integral: 2–6 meses según alcance.

PRESUPUESTO ORIENTATIVO:
Cuando el cliente pida presupuesto, pregunta: tipo de instalación, superficie en m², obra nueva o reforma, y localización. Da un rango orientativo y ofrece visita técnica gratuita.

CONTACTO: info@ecoenergiaasturias.com | ecoenergiaasturias.com

INSTRUCCIONES: Responde siempre en español. Sé conciso y claro. Si no sabes algo, dilo y ofrece contacto. Nunca inventes precios exactos, siempre rangos. Al hablar de presupuesto, ofrece siempre visita técnica gratuita.`;

const SYSTEM_CARLOS = `Eres el asistente personal de Carlos Álvarez, CEO de Ecoenergia Asturias. Tu función principal es ayudarle a redactar respuestas profesionales para WhatsApp con clientes.

Cuando Carlos te pegue un mensaje de WhatsApp de un cliente, debes:
1. Analizar qué pide el cliente
2. Generar una respuesta lista para copiar y pegar
3. La respuesta debe ser: cercana pero profesional, directa, sin rodeos, en español
4. Tono: como hablaría Carlos personalmente — serio, honesto, cercano
5. Longitud: corta-media, adecuada para WhatsApp
6. Siempre termina ofreciendo el siguiente paso concreto (visita, llamada, presupuesto)

También puedes ayudar a Carlos con: dudas técnicas de instalaciones, redacción de presupuestos, consultas sobre subvenciones, gestión de clientes.

SERVICIOS DE ECOENERGIA: aerotermia (8.000–18.000€), solar fotovoltaica (5.000–20.000€), ventilación MVHR (3.000–7.000€), rehabilitación energética integral, asesoría energética. Subvenciones PRTR hasta 60%. Zona: Asturias, León, Cantabria, Galicia.

IMPORTANTE: Cuando generes una respuesta de WhatsApp, escribe exactamente esto:
RESPUESTA PARA WHATSAPP:
[la respuesta aquí]

Eso es todo, sin más texto antes ni después, solo el bloque de respuesta.`;

let modo = 'cliente';
let history = [];
let isLoading = false;
let conversaciones = JSON.parse(localStorage.getItem('eco_conversaciones') || '[]');
let conversacionActual = null;
let mensajesActuales = [];

function setModo(m) {
  modo = m;
  history = [];
  mensajesActuales = [];
  conversacionActual = null;
  document.getElementById('messages').innerHTML = '';
  renderChips();

  const header = document.getElementById('header');
  const banner = document.getElementById('modoBanner');
  const btnC = document.getElementById('btnCliente');
  const btnK = document.getElementById('btnCarlos');
  const hint = document.getElementById('inputHint');
  const sub = document.getElementById('headerSub');
  const disc = document.getElementById('disclaimer');

  if (m === 'cliente') {
    document.body.classList.remove('modo-carlos');
    header.classList.remove('modo-carlos');
    banner.className = 'modo-banner cliente';
    document.getElementById('bannerText').textContent = 'Modo Cliente — El asistente responde como Ecoenergia';
    btnC.classList.add('active'); btnK.classList.remove('active');
    hint.textContent = 'Escribe tu consulta';
    sub.textContent = 'Asistente de atención al cliente';
    disc.style.display = 'block';
    addMessage('assistant', '¡Hola! Soy el asistente de Ecoenergia Asturias 🌱\n\nEstoy aquí para ayudarte con nuestros servicios de energía renovable y eficiencia energética. ¿En qué puedo ayudarte?');
  } else {
    document.body.classList.add('modo-carlos');
    header.classList.add('modo-carlos');
    banner.className = 'modo-banner carlos';
    document.getElementById('bannerText').textContent = 'Modo Carlos — Pega un WhatsApp y te genero la respuesta';
    btnK.classList.add('active'); btnC.classList.remove('active');
    hint.textContent = 'Pega el WhatsApp del cliente aquí';
    sub.textContent = 'Copiloto de Carlos';
    disc.style.display = 'none';
    addMessage('assistant', '¡Hola Carlos! ⚡\n\nPega el mensaje de WhatsApp del cliente y te genero la respuesta lista para copiar.\n\nTambién puedo ayudarte con dudas técnicas, presupuestos o cualquier consulta.');
  }
}

const chipsCliente = ['¿Qué servicios ofrecéis?','Presupuesto aerotermia','Plazos instalación solar','¿En qué zonas trabajáis?','Subvenciones disponibles'];
const chipsCarlos  = ['Cliente pregunta por precio solar','Cliente quiere visita técnica','Cliente pide plazo de instalación','Cliente pregunta por subvenciones'];

function renderChips() {
  const chips = document.getElementById('chips');
  const lista = modo === 'cliente' ? chipsCliente : chipsCarlos;
  chips.innerHTML = lista.map(c => `<button class="chip" onclick="sendChip('${c}')">${c}</button>`).join('');
  chips.style.display = 'flex';
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');

  if (role === 'assistant' && text.includes('RESPUESTA PARA WHATSAPP:')) {
    const parts = text.split('RESPUESTA PARA WHATSAPP:');
    const intro = parts[0].trim();
    const waText = parts[1] ? parts[1].trim() : '';

    if (intro) {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = `<div class="avatar">⚡</div><div class="bubble">${escHtml(intro)}</div>`;
      msgs.appendChild(div);
    }

    if (waText) {
      const waBox = document.createElement('div');
      waBox.className = 'wa-box';
      const id = 'wa_' + Date.now();
      waBox.innerHTML = `
        <div class="wa-label">📱 Respuesta lista para WhatsApp</div>
        <div class="wa-text" id="${id}">${escHtml(waText)}</div>
        <button class="copy-btn" onclick="copiarWA('${id}', this)">📋 Copiar respuesta</button>
      `;
      msgs.appendChild(waBox);
    }
    msgs.scrollTop = msgs.scrollHeight;
    guardarMensaje(role, text);
    return;
  }

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'assistant' ? (modo === 'carlos' ? '⚡' : '🌱') : '👤';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  guardarMensaje(role, text);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function copiarWA(id, btn) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.textContent = '✅ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar respuesta'; btn.classList.remove('copied'); }, 2000);
  });
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing';
  div.innerHTML = `<div class="avatar">${modo==='carlos'?'⚡':'🌱'}</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function callClaude(userText) {
  history.push({ role: 'user', content: userText });
  const system = modo === 'carlos' ? SYSTEM_CARLOS : SYSTEM_CLIENTE;
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages: history
    })
  });
  const data = await response.json();
  const reply = data.content?.[0]?.text || 'Lo siento, ha habido un error. Inténtalo de nuevo.';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  document.getElementById('chips').style.display = 'none';
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('assistant', reply);
    autoGuardarConversacion();
  } catch(e) {
    removeTyping();
    addMessage('assistant', 'Error de conexión. Inténtalo de nuevo o escribe a info@ecoenergiaasturias.com');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendChip(text) { document.getElementById('input').value = text; sendMessage(); }
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

function guardarMensaje(role, text) {
  mensajesActuales.push({ role, text, ts: Date.now() });
}

function autoGuardarConversacion() {
  const primera = mensajesActuales.find(m => m.role === 'user');
  if (!primera) return;
  const conv = {
    id: conversacionActual || Date.now().toString(),
    modo,
    fecha: new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }),
    preview: primera.text.substring(0, 60),
    mensajes: [...mensajesActuales],
    history: [...history]
  };
  conversacionActual = conv.id;
  const idx = conversaciones.findIndex(c => c.id === conv.id);
  if (idx >= 0) conversaciones[idx] = conv;
  else conversaciones.unshift(conv);
  if (conversaciones.length > 50) conversaciones = conversaciones.slice(0, 50);
  localStorage.setItem('eco_conversaciones', JSON.stringify(conversaciones));
}

function nuevaConversacion() {
  conversacionActual = null; mensajesActuales = []; history = [];
  document.getElementById('messages').innerHTML = '';
  renderChips(); closeHistorial(); setModo(modo);
}

function openHistorial() { renderHistorial(); document.getElementById('historialPanel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeHistorial() { document.getElementById('historialPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

function renderHistorial() {
  const list = document.getElementById('historialList');
  conversaciones = JSON.parse(localStorage.getItem('eco_conversaciones') || '[]');
  if (!conversaciones.length) {
    list.innerHTML = '<div class="historial-empty">Aún no hay conversaciones guardadas</div>';
    return;
  }
  list.innerHTML = conversaciones.map(c => `
    <div class="historial-item" onclick="cargarConversacion('${c.id}')">
      <div class="hi-fecha">${c.fecha}</div>
      <div class="hi-preview">${c.preview}...</div>
      <div class="hi-modo ${c.modo}">${c.modo==='carlos'?'⚡ Carlos':'🌐 Cliente'}</div>
    </div>
  `).join('');
}

function cargarConversacion(id) {
  conversaciones = JSON.parse(localStorage.getItem('eco_conversaciones') || '[]');
  const conv = conversaciones.find(c => c.id === id);
  if (!conv) return;
  conversacionActual = id;
  history = [...conv.history];
  mensajesActuales = [...conv.mensajes];
  if (conv.modo !== modo) {
    modo = conv.modo;
    if (modo === 'carlos') {
      document.body.classList.add('modo-carlos');
      document.getElementById('header').classList.add('modo-carlos');
      document.getElementById('modoBanner').className = 'modo-banner carlos';
      document.getElementById('bannerText').textContent = 'Modo Carlos — Pega un WhatsApp y te genero la respuesta';
      document.getElementById('btnCarlos').classList.add('active');
      document.getElementById('btnCliente').classList.remove('active');
      document.getElementById('inputHint').textContent = 'Pega el WhatsApp del cliente aquí';
      document.getElementById('disclaimer').style.display = 'none';
    } else {
      document.body.classList.remove('modo-carlos');
      document.getElementById('header').classList.remove('modo-carlos');
      document.getElementById('modoBanner').className = 'modo-banner cliente';
      document.getElementById('bannerText').textContent = 'Modo Cliente — El asistente responde como Ecoenergia';
      document.getElementById('btnCliente').classList.add('active');
      document.getElementById('btnCarlos').classList.remove('active');
      document.getElementById('inputHint').textContent = 'Escribe tu consulta';
      document.getElementById('disclaimer').style.display = 'block';
    }
  }
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  document.getElementById('chips').style.display = 'none';
  conv.mensajes.forEach(m => {
    if (m.role === 'assistant' && m.text.includes('RESPUESTA PARA WHATSAPP:')) {
      const parts = m.text.split('RESPUESTA PARA WHATSAPP:');
      const intro = parts[0].trim(); const waText = parts[1] ? parts[1].trim() : '';
      if (intro) { const d = document.createElement('div'); d.className='msg assistant'; d.innerHTML=`<div class="avatar">⚡</div><div class="bubble">${escHtml(intro)}</div>`; msgs.appendChild(d); }
      if (waText) { const wid='wa_'+Math.random().toString(36).substr(2,9); const wb=document.createElement('div'); wb.className='wa-box'; wb.innerHTML=`<div class="wa-label">📱 Respuesta lista para WhatsApp</div><div class="wa-text" id="${wid}">${escHtml(waText)}</div><button class="copy-btn" onclick="copiarWA('${wid}',this)">📋 Copiar respuesta</button>`; msgs.appendChild(wb); }
    } else {
      const d = document.createElement('div'); d.className=`msg ${m.role}`;
      const av = m.role==='assistant'?(conv.modo==='carlos'?'⚡':'🌱'):'👤';
      d.innerHTML=`<div class="avatar">${av}</div><div class="bubble">${escHtml(m.text)}</div>`;
      msgs.appendChild(d);
    }
  });
  msgs.scrollTop = msgs.scrollHeight;
  closeHistorial();
}

function borrarTodo() {
  if (!confirm('¿Borrar todas las conversaciones guardadas?')) return;
  conversaciones = [];
  localStorage.removeItem('eco_conversaciones');
  renderHistorial();
}

window.onload = () => { renderChips(); setModo('cliente'); };
</script>
</body>
</html>
